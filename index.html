<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MiraiZandaka はブラウザだけで動く未来残高シミュレーターです。">
    <title>MiraiZandaka | 未来残高シミュレーター</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
    <script>
      window.tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ['"Noto Sans JP"', 'system-ui', 'sans-serif']
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-icon material-symbols-rounded" aria-hidden="true">calculate</span>
          <div>
            <p class="brand-name">MiraiZandaka</p>
            <p class="brand-subtitle" data-i18n="app.subtitle">未来残高シミュレーター</p>
          </div>
        </div>
        <div class="topbar-actions">
          <span class="save-indicator">
            <span class="material-symbols-rounded" aria-hidden="true">lock</span>
            <span data-i18n="storage.local">localStorage保存</span>
          </span>
          <label class="locale-switcher">
            <span class="material-symbols-rounded" aria-hidden="true">language</span>
            <select id="localeSelect" aria-label="言語" data-i18n-aria-label="language.label">
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </label>
          <button class="icon-button" id="menuButton" type="button" aria-expanded="false" aria-controls="menuPanel" aria-label="メニュー" data-i18n-aria-label="menu.label">
            <span class="material-symbols-rounded" aria-hidden="true">menu</span>
          </button>
          <div class="menu-panel" id="menuPanel" hidden>
            <button type="button" id="loadSampleButton">
              <span class="material-symbols-rounded" aria-hidden="true">restart_alt</span>
              <span data-i18n="menu.sample">サンプルに戻す</span>
            </button>
            <button type="button" id="clearDataButton">
              <span class="material-symbols-rounded" aria-hidden="true">delete</span>
              <span data-i18n="menu.clear">保存データを削除</span>
            </button>
          </div>
        </div>
      </header>

      <main>
        <section class="summary-strip" aria-label="残高サマリー" data-i18n-aria-label="summary.aria">
          <article class="summary-cell current">
            <span data-i18n="summary.current">現在残高</span>
            <strong id="currentBalanceText">¥0</strong>
            <small id="updatedAtText" data-i18n="summary.unsaved">未保存</small>
          </article>
          <article class="summary-cell">
            <span data-i18n="summary.threeMonths">3ヶ月後の予測</span>
            <strong id="threeMonthText">¥0</strong>
            <small id="threeMonthDelta">差分 ¥0</small>
          </article>
          <article class="summary-cell">
            <span data-i18n="summary.sixMonths">6ヶ月後の予測</span>
            <strong id="sixMonthText">¥0</strong>
            <small id="sixMonthDelta">差分 ¥0</small>
          </article>
        </section>

        <div class="workspace">
          <section class="panel entry-panel" aria-labelledby="entryTitle">
            <div class="panel-heading">
              <div>
                <span class="eyebrow">quick input</span>
                <h1 id="entryTitle" data-i18n="entry.title">予定を追加</h1>
              </div>
              <button class="text-button" id="cancelEditButton" type="button" hidden data-i18n="actions.cancelEdit">編集をやめる</button>
            </div>

            <form id="scheduleForm" class="entry-form" novalidate>
              <label class="field">
                <span data-i18n="fields.title">タイトル</span>
                <input id="titleInput" type="text" maxlength="28" autocomplete="off" placeholder="例: 食費、給与、家賃など" data-i18n-placeholder="fields.titlePlaceholder" required>
              </label>

              <div class="category-block">
                <label class="field">
                  <span data-i18n="fields.category">カテゴリ</span>
                  <select id="categorySelect" data-i18n-aria-label="fields.category"></select>
                </label>
                <div class="category-add-row">
                  <input id="categoryNameInput" type="text" maxlength="18" autocomplete="off" placeholder="例: 教育費" data-i18n-placeholder="fields.categoryPlaceholder">
                  <button type="button" id="addCategoryButton" data-i18n="actions.addCategory">カテゴリ追加</button>
                </div>
                <div class="category-chips" id="categoryChips" aria-live="polite"></div>
              </div>

              <label class="field">
                <span data-i18n="fields.amount">金額</span>
                <div class="amount-row">
                  <span class="yen-prefix" aria-hidden="true">¥</span>
                  <input id="amountInput" type="number" inputmode="numeric" min="0" step="100" placeholder="0" required>
                </div>
              </label>

              <div class="quick-amounts" aria-label="金額をすばやく追加" data-i18n-aria-label="fields.quickAmounts">
                <button type="button" data-amount="1000">+1,000</button>
                <button type="button" data-amount="5000">+5,000</button>
                <button type="button" data-amount="10000">+10,000</button>
                <button type="button" data-amount="50000">+50,000</button>
              </div>

              <fieldset class="field-group">
                <legend data-i18n="fields.kind">種類</legend>
                <div class="segmented-control" role="group" aria-label="収入または支出" data-i18n-aria-label="fields.kindAria">
                  <button type="button" class="segment is-active income" id="incomeButton" data-kind="income" aria-pressed="true">
                    <span class="material-symbols-rounded" aria-hidden="true">north_east</span>
                    <span data-i18n="kind.income">収入</span>
                  </button>
                  <button type="button" class="segment expense" id="expenseButton" data-kind="expense" aria-pressed="false">
                    <span class="material-symbols-rounded" aria-hidden="true">south_east</span>
                    <span data-i18n="kind.expense">支出</span>
                  </button>
                </div>
              </fieldset>

              <fieldset class="field-group">
                <legend data-i18n="fields.repeat">繰り返し</legend>
                <div class="segmented-control" role="group" aria-label="予定タイプ" data-i18n-aria-label="fields.repeatAria">
                  <button type="button" class="segment is-active" data-repeat="monthly" aria-pressed="true">
                    <span class="material-symbols-rounded" aria-hidden="true">sync</span>
                    <span data-i18n="repeat.monthly">毎月</span>
                  </button>
                  <button type="button" class="segment" data-repeat="one-time" aria-pressed="false">
                    <span class="material-symbols-rounded" aria-hidden="true">event</span>
                    <span data-i18n="repeat.oneTime">単発</span>
                  </button>
                </div>
              </fieldset>

              <div class="date-grid">
                <label class="field" id="monthlyDayField">
                  <span data-i18n="fields.monthlyDay">毎月の日付</span>
                  <input id="dayInput" type="number" min="1" max="31" inputmode="numeric" value="25">
                </label>
                <label class="field" id="oneTimeDateField" hidden>
                  <span data-i18n="fields.oneTimeDate">単発の日付</span>
                  <input id="dateInput" type="date">
                </label>
                <label class="field">
                  <span data-i18n="fields.currentBalance">現在残高</span>
                  <input id="balanceInput" type="number" inputmode="numeric" step="1000" required>
                </label>
              </div>

              <p class="form-feedback" id="formFeedback" role="status" aria-live="polite"></p>

              <div class="form-actions">
                <button class="save-balance-button" id="saveBalanceButton" type="button">
                  <span class="material-symbols-rounded" aria-hidden="true">edit</span>
                  <span data-i18n="actions.saveBalance">残高を保存</span>
                </button>
                <button class="primary-button" id="submitButton" type="submit">
                  <span class="material-symbols-rounded" aria-hidden="true">add_circle</span>
                  <span data-i18n="actions.add">追加する</span>
                </button>
              </div>
            </form>
          </section>

          <section class="panel chart-panel" aria-labelledby="chartTitle">
            <div class="panel-heading inline-heading">
              <div>
                <span class="eyebrow">forecast</span>
                <h2 id="chartTitle" data-i18n="forecast.title">予測残高の推移</h2>
              </div>
              <div class="range-tabs" role="group" aria-label="表示期間" data-i18n-aria-label="forecast.rangeAria">
                <button type="button" data-range="30" data-i18n="forecast.range30">30日</button>
                <button type="button" class="is-active" data-range="90" data-i18n="forecast.range90">90日</button>
                <button type="button" data-range="180" data-i18n="forecast.range180">180日</button>
              </div>
            </div>
            <div class="forecast-note" id="forecastNote"></div>
            <div class="chart-frame">
              <canvas id="balanceChart" aria-label="未来の残高推移グラフ" data-i18n-aria-label="forecast.chartAria"></canvas>
              <p class="chart-fallback" id="chartFallback" hidden data-i18n="forecast.chartFallback">Chart.jsを読み込むとグラフが表示されます。</p>
            </div>
          </section>
        </div>

        <section class="panel schedule-panel" aria-labelledby="scheduleTitle">
          <div class="panel-heading inline-heading">
            <div>
              <span class="eyebrow">upcoming</span>
              <h2 id="scheduleTitle" data-i18n="schedule.title">今後の予定</h2>
            </div>
            <p class="schedule-total" id="monthlyTotalText">毎月合計 ¥0</p>
          </div>
          <div id="scheduleList" class="schedule-list"></div>
          <p class="empty-state" id="emptyState" hidden data-i18n="schedule.empty">予定はまだありません。最初の固定費や給与を追加してみましょう。</p>
        </section>

        <section class="storage-note" aria-label="保存方法" data-i18n-aria-label="storage.aria">
          <span class="material-symbols-rounded" aria-hidden="true">shield_lock</span>
          <span data-i18n="storage.note">データはこの端末のブラウザにのみ保存されます。</span>
        </section>

        <div class="ad-space" aria-hidden="true"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
